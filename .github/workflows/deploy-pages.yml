name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_SUPABASE_PROJECT_ID: vhdrmhnsnngfnnsfbrln
          VITE_SUPABASE_URL: https://vhdrmhnsnngfnnsfbrln.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoZHJtaG5zbm5nZm5uc2ZicmxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDcxMTUsImV4cCI6MjA5MDYyMzExNX0.OwmJBgvT49jbKZKVyIQ0j-q_S_F58Y1YhAyJGS4J9nw
          VITE_QWEN_API_URL: ${{ secrets.VITE_QWEN_API_URL }}
          VITE_QWEN_API_KEY: ${{ secrets.VITE_QWEN_API_KEY }}
          VITE_QWEN_MODEL: ${{ secrets.VITE_QWEN_MODEL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
